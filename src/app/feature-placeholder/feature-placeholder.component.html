<section class="min-h-[calc(100vh-73px)] px-8 py-8">
  <div class="mx-auto max-w-3xl rounded-3xl border border-slate-200 bg-white p-10 shadow-sm">
    <span class="inline-flex rounded-full bg-amber-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-amber-700">
      Proximamente
    </span>

    <h1 class="mt-4 text-3xl font-bold text-slate-900">{{ title }}</h1>
    <p class="mt-3 text-base leading-7 text-slate-600">{{ description }}</p>

    <div class="mt-8 flex items-center gap-3">
      <a
        [routerLink]="backRoute"
        class="rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-slate-700"
      >
        Volver
      </a>
    </div>
  </div>
</section>
