<section class="min-h-[calc(100vh-73px)] bg-slate-50 px-8 py-8">
  <nav class="mb-4 text-sm text-slate-400">
    <span>Dashboard</span>
    <span class="mx-2">></span>
    <span class="font-medium text-slate-700">Productos</span>
  </nav>

  <div class="mb-8 flex items-start justify-between">
    <div>
      <h1 class="text-3xl font-bold text-slate-900">Catalogo de Productos</h1>
      <p class="mt-1 text-sm text-slate-500">Consulta y administra el inventario disponible.</p>
    </div>

    <button
      (click)="createNewProduct()"
      class="rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white transition-colors hover:bg-slate-700"
    >
      Agregar producto
    </button>
  </div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="h-10 w-10 animate-spin rounded-full border-b-2 border-slate-900"></div>
  </div>

  <div *ngIf="error" class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
    {{ error }}
  </div>

  <div *ngIf="successMessage" class="mt-4 rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
    {{ successMessage }}
  </div>

  <div *ngIf="!loading && !error && productos.length > 0" class="grid grid-cols-1 gap-5 lg:grid-cols-2 xl:grid-cols-3">
    <article *ngFor="let producto of productos" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-wide text-slate-400">Producto</p>
          <h2 class="mt-2 text-lg font-semibold text-slate-900">{{ producto.nombre }}</h2>
        </div>
        <span class="rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">
          #{{ producto.idProducto }}
        </span>
      </div>

      <p class="mt-6 text-sm text-slate-500">Precio registrado</p>
      <p class="mt-2 text-2xl font-bold text-slate-900">{{ producto.precio | currency:'COP':'symbol':'1.0-0' }}</p>

      <div class="mt-6 flex items-center gap-2">
        <button
          (click)="editProduct(producto.idProducto)"
          class="flex-1 rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-100"
        >
          Editar
        </button>
        <button
          (click)="deleteProduct(producto.idProducto, producto.nombre)"
          class="flex-1 rounded-xl border border-red-200 bg-red-50 px-4 py-2 text-sm font-semibold text-red-700 transition-colors hover:bg-red-100"
        >
          Eliminar
        </button>
      </div>
    </article>
  </div>

  <div *ngIf="!loading && !error && productos.length === 0" class="rounded-3xl border border-dashed border-slate-300 bg-white px-8 py-16 text-center text-slate-500">
    No hay productos registrados.
  </div>
</section>
